name: Update precios (dólar + diésel)

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Run scraper
        run: node scripts/update-precios.mjs

      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain src/content/datasets/information.ts)" ]]; then
            git config user.name  "catracho-bot"
            git config user.email "bot@catrachohn.com"
            git add src/content/datasets/information.ts
            git commit -m "chore(precios): actualización automática diaria"
            git push
          else
            echo "Sin cambios."
          fi
